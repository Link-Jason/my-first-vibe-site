<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHALL WE PLAY A GAME?</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            overflow: hidden; position: fixed; width: 100%; height: 100%;
            margin: 0; display: flex; justify-content: center; align-items: center;
            flex-direction: column; background-color: #1a1a1a; color: #39FF14;
            font-family: 'VT323', monospace; touch-action: none;
        }
        h1 { font-family: 'Press Start 2P', cursive; font-size: clamp(12px, 4vw, 20px); text-align: center; margin-bottom: 20px; text-shadow: 0 0 10px #39FF14; }
        .pong-game {
            position: relative; width: 600px; height: 400px; background: #000;
            border: 4px solid #39FF14; box-shadow: 0 0 20px rgba(57, 255, 20, 0.5);
        }
        @media (max-width: 650px) { .pong-game { width: 90vw; height: 60vw; } }
        .pong-ball { position: absolute; width: 15px; height: 15px; background: #39FF14; box-shadow: 0 0 10px #39FF14; border-radius: 2px; }
        .pong-paddle { position: absolute; width: 10px; height: 60px; background: #39FF14; box-shadow: 0 0 8px #39FF14; }
        .paddle-left { left: 10px; }
        .paddle-right { right: 10px; }
        .score { position: absolute; top: 20px; font-family: 'Press Start 2P'; font-size: 20px; color: rgba(57, 255, 20, 0.5); }
        .score-left { left: 25%; }
        .score-right { right: 25%; }
        .crt-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 10;
        }
        button {
            margin-top: 20px; padding: 15px 25px; font-family: 'Press Start 2P';
            background: #000; color: #39FF14; border: 2px solid #39FF14; cursor: pointer;
            font-size: 12px; transition: 0.2s;
        }
        button:active { transform: scale(0.95); background: #39FF14; color: #000; }
        @keyframes shake { 0% { transform: translate(0,0); } 25% { transform: translate(2px,2px); } 50% { transform: translate(-2px,-2px); } 100% { transform: translate(0,0); } }
        .shake { animation: shake 0.2s ease-in-out; }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>
    <h1>SHALL WE PLAY A GAME?</h1>
    <div class="pong-game" id="gameArea">
        <div class="score score-left" id="sL">0</div>
        <div class="score score-right" id="sR">0</div>
        <div class="pong-ball" id="ball"></div>
        <div class="pong-paddle paddle-left" id="pL"></div>
        <div class="pong-paddle paddle-right" id="pR"></div>
    </div>
    <button id="startBtn">START GAME</button>

    <script>
        const ball = document.getElementById('ball');
        const pL = document.getElementById('pL');
        const pR = document.getElementById('pR');
        const gameArea = document.getElementById('gameArea');
        const startBtn = document.getElementById('startBtn');

        let bX = 292, bY = 192, bSX = 4, bSY = 4;
        let pLY = 170, pRY = 170;
        let scoreL = 0, scoreR = 0;
        let active = false;
        let aiSpeed = 3.5;

        // --- CONTROLS ---
        // PC: W/S or Arrows
        window.addEventListener('keydown', (e) => {
            if (e.key === 'w' || e.key === 'ArrowUp') pLY = Math.max(0, pLY - 30);
            if (e.key === 's' || e.key === 'ArrowDown') pLY = Math.min(340, pLY + 30);
        });

        // PHONE: Drag Horizontally to Move Vertically
        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const rect = gameArea.getBoundingClientRect();
            // Map horizontal finger position (left to right) to paddle position (top to bottom)
            let relativeX = (touch.clientX - rect.left) / rect.width;
            pLY = relativeX * 340; 
            if (pLY < 0) pLY = 0;
            if (pLY > 340) pLY = 340;
            e.preventDefault();
        }, {passive: false});

        startBtn.addEventListener('click', () => {
            active = true;
            startBtn.style.display = 'none';
            gameLoop();
        });

        function gameLoop() {
            if (!active) return;

            // Move Ball
            bX += bSX; bY += bSY;

            // AI (Right Paddle)
            let pRMid = pRY + 30;
            if (pRMid < bY) pRY += aiSpeed;
            else pRY -= aiSpeed;

            // Wall Bounce
            if (bY <= 0 || bY >= 385) {
                bSY *= -1;
                gameArea.classList.add('shake');
                setTimeout(() => gameArea.classList.remove('shake'), 200);
            }

            // Paddle Hits
            if (bX <= 20 && bY > pLY && bY < pLY + 60) { bSX *= -1.1; bX = 21; }
            if (bX >= 570 && bY > pRY && bY < pRY + 60) { bSX *= -1.1; bX = 569; }

            // Score
            if (bX < 0) { scoreR++; reset(); aiSpeed += 0.2; }
            if (bX > 600) { scoreL++; reset(); }

            // Update Visuals
            ball.style.left = bX + 'px';
            ball.style.top = bY + 'px';
            pL.style.top = pLY + 'px';
            pR.style.top = pRY + 'px';
            document.getElementById('sL').innerText = scoreL;
            document.getElementById('sR').innerText = scoreR;

            requestAnimationFrame(gameLoop);
        }

        function reset() {
            bX = 292; bY = 192;
            bSX = Math.random() > 0.5 ? 4 : -4;
            bSY = 4;
        }
    </script>
</body>
</html>
